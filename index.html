<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>O-Days</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 18px;
  background: black;
  color: white;
}

h1 {
  text-align: center;
  font-size: 26px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

/* inputs */
input, select {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #1c1c1e;
  color: white;
}

/* row */
.cycle {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  margin-top: 15px;
  scroll-behavior: smooth;
}

/* tiles */
.day {
  flex: 0 0 95px;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  font-size: 15px;
  border: 2px solid #666;
}

/* WORK */
.work {
  background: #8b0000;
  color: #fff;
  opacity: 0.85;
}

/* OFF */
.off {
  background: #00e676;
  color: #000;
  font-weight: bold;
}

/* SELECTED DAY */
.today {
  border: 3px solid #ffffff;
  background: #111;
  color: #ffffff;
  box-shadow: 
    0 0 16px #ffffff,
    inset 0 0 6px #ffffff;
  transform: scale(1.05);
}

/* version */
.version {
  position: fixed;
  bottom: 5px;
  right: 10px;
  font-size: 12px;
  opacity: 0.5;
}
</style>

</head>

<body>

<h1>O-DAYS</h1>

<label>Start of Work Block:</label> <input id="start" type="date">

<label>Pattern:</label> <select id="pattern">

  <option value="5-3">5 / 3</option>
  <option value="4-4">4 / 4</option>
  <option value="3-5">3 / 5</option>
</select>

<label>Check Date:</label> <input id="check" type="date" onchange="run()">

<div id="out"></div>

<div class="version">v12</div>

<script>
function run() {
  let s = new Date(document.getElementById("start").value);
  let c = new Date(document.getElementById("check").value);
  let p = document.getElementById("pattern").value.split("-");
  let work = parseInt(p[0]);
  let off = parseInt(p[1]);
  let cycle = work + off;

  let html = "";

  for (let i = -3; i <= 4; i++) {
    let d = new Date(c);
    d.setDate(c.getDate() + i);

    let diff = Math.floor((d - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;

    let type = pos < work ? "work" : "off";

    html += "<div class='day " + type + (i===0 ? " today" : "") + "'>" +
            d.getDate() + "<br>" + type +
            "</div>";
  }

  document.getElementById("out").innerHTML =
    "<div class='cycle' id='cycle'>" + html + "</div>";

  // 👉 AUTO-CENTRE SELECTED DAY
  setTimeout(() => {
    const today = document.querySelector('.today');
    if (today) {
      today.scrollIntoView({
        behavior: "smooth",
        inline: "center",
        block: "nearest"
      });
    }
  }, 50);
}
</script>

</body>
</html>
