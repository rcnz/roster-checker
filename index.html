<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roster Checker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 500px;
    margin: 20px auto;
    padding: 15px;
}

h1 { text-align: center; }

input, select, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    font-size: 16px;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    font-size: 18px;
}

.cycle {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    overflow-x: auto;
    width: 100%;
    margin-top: 10px;
    border: 1px solid #ccc;
    -webkit-overflow-scrolling: touch;
}

.day {
    flex: 0 0 90px;
    padding: 8px 4px;
    border: 1px solid #ccc;
    font-size: 12px;
    text-align: center;
    box-sizing: border-box;
}

.day.work { background: #f8d7da; }  /* red for work */
.day.off  { background: #d4edda; }  /* green for off */

.today {
    border: 3px solid #000;
    background: #fff;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>Roster Checker</h1>

<label>First Work Day:</label> <input type="date" id="startDate">

<label>Pattern:</label> <select id="pattern"> <option value="5-3">5 Work / 3 Off</option> <option value="4-4">4 Work / 4 Off</option> <option value="3-5">3 Work / 5 Off</option> </select>

<label>Check Date:</label> <input type="date" id="checkDate">

<button onclick="checkShift()">Check Roster</button>

<div id="output"></div>

<script>
function checkShift() {
    const start = new Date(document.getElementById("startDate").value);
    const check = new Date(document.getElementById("checkDate").value);
    const pattern = document.getElementById("pattern").value;

    if (!start || !check) {
        alert("Please enter both dates");
        return;
    }

    let workDays, offDays;
    if (pattern === "5-3") { workDays = 5; offDays = 3; }
    if (pattern === "4-4") { workDays = 4; offDays = 4; }
    if (pattern === "3-5") { workDays = 3; offDays = 5; }

    const cycle = workDays + offDays;

    const isWorkDay = (date) => {
        const diff = Math.floor((date - start) / (1000 * 60 * 60 * 24));
        const pos = ((diff % cycle) + cycle) % cycle;
        return pos < workDays;
    };

    const isWork = isWorkDay(check);

    let html = `
        <div class="result ${isWork ? "work" : "off"}">
            <strong>${check.toDateString()}</strong><br>
            Status: ${isWork ? "WORK" : "OFF"}
        </div>
    `;

    html += `<div class="cycle">`;

    for (let i = -3; i <= 4; i++) {
        let d = new Date(check);
        d.setDate(check.getDate() + i);

        let type = isWorkDay(d) ? "work" : "off";

        let label = d.toLocaleDateString(undefined, { day: '2-digit', month: 'short' });

        html += `<div class="day ${type} ${i===0 ? 'today' : ''}">
                    ${label}<br>${type}
                 </div>`;
    }

    html += `</div>`;

    document.getElementById("output").innerHTML = html;

    // Auto-centre selected day
    setTimeout(() => {
        const today = document.querySelector('.today');
        if (today) {
            today.scrollIntoView({
                behavior: 'smooth',
                inline: 'center',
                block: 'nearest'
            });
        }
    }, 100);
}
</script>

</body>
</html>
