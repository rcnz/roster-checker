<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>O-Days</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 18px;
  background: black;
  color: white;
}

h1 {
  text-align: center;
  font-size: 26px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

input, select, button {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
}

input, select {
  background: #1c1c1e;
  color: white;
}

.banner {
  text-align: center;
  margin: 10px 0;
  font-size: 18px;
  font-weight: bold;
  color: #00e676;
}

.cycle {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  margin-top: 15px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.day {
  flex: 0 0 95px;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  font-size: 15px;
  border: 2px solid #666;
}

.work {
  background: #8b0000;
  color: #fff;
  opacity: 0.85;
}

.off {
  background: #00e676;
  color: #000;
  font-weight: bold;
}

.work.today {
  background: #ff2a2a;
  border: 3px solid #ffffff;
  box-shadow: 0 0 14px #ff2a2a;
  opacity: 1;
  transform: scale(1.08);
}

.off.today {
  background: #00ff99;
  border: 3px solid #ffffff;
  box-shadow: 0 0 14px #00ff99;
  transform: scale(1.08);
}

.login {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

.version {
  position: fixed;
  bottom: 5px;
  right: 10px;
  font-size: 12px;
  opacity: 0.5;
}
</style>

</head>

<body>

<div id="loginScreen" class="login" style="display:none;">
  <h2>O-DAYS</h2>
  <input type="password" id="pw" placeholder="Enter password">
  <button onclick="checkPassword()">Enter</button>
</div>

<div id="app" style="display:none;">

<h1>O-DAYS</h1>

<label>Start of Work Block:</label> <input id="start" type="date">

<label>Pattern:</label> <select id="pattern">

  <option value="5-3">5 / 3</option>
  <option value="4-4">4 / 4</option>
  <option value="3-5">3 / 5</option>
</select>

<label>Check Date:</label> <input id="check" type="date" onchange="run()">

<div id="nextOff" class="banner"></div>

<div id="out"></div>

<div class="version">v17</div>

</div>

<script>

const PASSWORD = "123koru";

function checkPassword() {
  const input = document.getElementById("pw").value.trim();

  if (input === PASSWORD) {
    localStorage.setItem("auth", "yes");
    showApp();
  } else {
    alert("Incorrect password");
  }
}

function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

if (localStorage.getItem("auth") === "yes") {
  showApp();
} else {
  document.getElementById("loginScreen").style.display = "flex";
}

window.addEventListener("DOMContentLoaded", () => {
  const s = localStorage.getItem("start");
  const p = localStorage.getItem("pattern");

  if (s) document.getElementById("start").value = s;
  if (p) document.getElementById("pattern").value = p;
});

function run() {

  let sVal = document.getElementById("start").value;
  let cVal = document.getElementById("check").value;
  let p = document.getElementById("pattern").value.split("-");

  if (!sVal || !cVal) return;

  localStorage.setItem("start", sVal);
  localStorage.setItem("pattern", document.getElementById("pattern").value);

  let s = new Date(sVal);
  let c = new Date(cVal);

  let work = parseInt(p[0]);
  let off = parseInt(p[1]);
  let cycle = work + off;

  let html = "";

  for (let i = -3; i <= 4; i++) {
    let d = new Date(c);
    d.setDate(c.getDate() + i);

    let diff = Math.floor((d - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;

    let type = pos < work ? "work" : "off";

    let label = (i === 0) ? type.toUpperCase() : type;

    html += "<div class='day " + type + (i===0 ? " today" : "") + "'>" +
            d.getDate() + "<br>" + label +
            "</div>";
  }

  document.getElementById("out").innerHTML =
    "<div class='cycle'>" + html + "</div>";

  let next = new Date(c);
  while (true) {
    let diff = Math.floor((next - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;
    if (pos >= work) break;
    next.setDate(next.getDate() + 1);
  }

  document.getElementById("nextOff").innerText =
    "Next OFF: " + next.toDateString();

  setTimeout(() => {
    document.querySelector('.today')?.scrollIntoView({
      behavior: "smooth",
      inline: "center"
    });
  }, 50);
}
</script>

</body>
</html>
