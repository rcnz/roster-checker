<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>O-Days</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Flatpickr -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  padding: 18px;
}

h1 {
  text-align: center;
  font-size: 26px;
}

/* inputs */
input, select {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #1c1c1e;
  color: white;
}

/* tiles */
.day {
  display: inline-block;
  width: 90px;
  padding: 12px;
  margin: 4px;
  border-radius: 10px;
  text-align: center;
  border: 2px solid #666;
}

.work {
  background: #8b0000;
  color: #fff;
}

.off {
  background: #00e676;
  color: #000;
  font-weight: bold;
}

.today {
  border: 3px solid #fff;
  box-shadow: 0 0 14px #fff;
}
</style>

</head>

<body>

<h1>O-DAYS</h1>

<label>Start of Work Block:</label> <input id="start">

<label>Pattern:</label> <select id="pattern">

  <option value="5-3">5 / 3</option>
  <option value="4-4">4 / 4</option>
  <option value="3-5">3 / 5</option>
</select>

<label>Check Date:</label> <input id="check">

<div id="out"></div>

<script>

/* date picker */
flatpickr("#start", {
  dateFormat: "d M Y"
});

flatpickr("#check", {
  dateFormat: "d M Y",
  onChange: run
});

function run() {
  let s = new Date(document.getElementById("start").value);
  let c = new Date(document.getElementById("check").value);
  let p = document.getElementById("pattern").value.split("-");
  let work = parseInt(p[0]);
  let off = parseInt(p[1]);
  let cycle = work + off;

  let html = "";

  for (let i = -3; i <= 4; i++) {
    let d = new Date(c);
    d.setDate(c.getDate() + i);

    let diff = Math.floor((d - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;

    let type = pos < work ? "work" : "off";

    html += "<div class='day " + type + (i===0 ? " today" : "") + "'>" +
            d.getDate() + "<br>" + type +
            "</div>";
  }

  document.getElementById("out").innerHTML = html;
}
</script>

</body>
</html>
