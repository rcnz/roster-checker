<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>O-Days</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  padding: 18px;
}

h1 {
  text-align: center;
  font-size: 26px;
}

input, select, button {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
}

input, select {
  background: #1c1c1e;
  color: white;
}

button {
  background: #007aff;
  color: white;
  font-weight: bold;
}

/* helper */
.helper {
  font-size: 13px;
  opacity: 0.7;
  margin-top: -8px;
  margin-bottom: 12px;
  display: none;
}

/* banner */
.banner {
  text-align: center;
  margin: 10px 0;
  font-size: 18px;
  font-weight: bold;
  color: #00ff99;
}

/* row */
.cycle {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

/* tiles */
.day {
  width: 90px;
  padding: 12px;
  margin: 4px;
  border-radius: 10px;
  text-align: center;
  border: 2px solid #666;
}

.day-number {
  font-size: 18px;
  font-weight: bold;
}

.day-label {
  font-size: 13px;
}

/* WORK */
.work {
  background: #8b0000;
  color: #fff;
}

/* OFF */
.off {
  background: #00ff99;
  color: #000;
  font-weight: bold;
  box-shadow: 0 0 8px #00ff99;
}

/* SELECTED */
.work.today {
  background: #ff2a2a;
  border: 3px solid #fff;
  box-shadow: 0 0 14px #ff2a2a;
}

.off.today {
  background: #00ff99;
  border: 3px solid #fff;
  box-shadow: 0 0 16px #00ff99;
}

.today .day-number {
  font-size: 22px;
}

.today .day-label {
  font-size: 16px;
  font-weight: bold;
}

/* LOGIN */
.login {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

.version {
  position: fixed;
  bottom: 5px;
  right: 10px;
  font-size: 14px;
  opacity: 0.7;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="login" style="display:none;">
  <h2>O-DAYS</h2>
  <input type="password" id="pw" placeholder="Enter password">
  <button onclick="checkPassword()">Enter</button>
</div>

<!-- APP -->

<div id="app" style="display:none;">

<h1>O-DAYS</h1>

<label>Start of Work Block:</label> <input id="start">

<div id="helperText" class="helper">
  Cycle anchored to your first WORK day of block
</div>

<label>Pattern:</label> <select id="pattern">

  <option value="5-3">5 / 3</option>
  <option value="4-4">4 / 4</option>
  <option value="3-5">3 / 5</option>
</select>

<label>Check Date:</label> <input id="check">

<div id="nextOff" class="banner"></div>

<div id="out"></div>

<div class="version">v29</div>

</div>

<script>

/* PASSWORD */
const PASSWORD = "123koru";

function checkPassword() {
  const input = document.getElementById("pw").value.trim();

  if (input === PASSWORD) {
    localStorage.setItem("auth", "yes");
    showApp();
  } else {
    alert("Incorrect password");
  }
}

function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* LOGIN CHECK */
if (localStorage.getItem("auth") === "yes") {
  showApp();
} else {
  document.getElementById("loginScreen").style.display = "flex";
}

/* DATE PICKERS */
flatpickr("#start", {
  dateFormat: "d M Y",
  onChange: toggleHelper
});

flatpickr("#check", {
  dateFormat: "d M Y",
  onChange: run
});

/* helper visibility */
function toggleHelper() {
  const val = document.getElementById("start").value;
  document.getElementById("helperText").style.display = val ? "block" : "none";
}

/* load saved values */
window.addEventListener("DOMContentLoaded", () => {
  const s = localStorage.getItem("start");
  const p = localStorage.getItem("pattern");

  if (s) document.getElementById("start").value = s;
  if (p) document.getElementById("pattern").value = p;

  toggleHelper();
});

/* MAIN */
function run() {

  let sVal = document.getElementById("start").value;
  let cVal = document.getElementById("check").value;
  let p = document.getElementById("pattern").value.split("-");

  if (!sVal || !cVal) return;

  localStorage.setItem("start", sVal);
  localStorage.setItem("pattern", document.getElementById("pattern").value);

  let s = new Date(sVal);
  let c = new Date(cVal);

  let work = parseInt(p[0]);
  let off = parseInt(p[1]);
  let cycle = work + off;

  let html = "";

  for (let i = -3; i <= 4; i++) {
    let d = new Date(c);
    d.setDate(c.getDate() + i);

    let diff = Math.floor((d - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;

    let type = pos < work ? "work" : "off";
    let label = (i === 0) ? type.toUpperCase() : type;

    html += "<div class='day " + type + (i===0 ? " today" : "") + "'>" +
            "<div class='day-number'>" + d.getDate() + "</div>" +
            "<div class='day-label'>" + label + "</div>" +
            "</div>";
  }

  document.getElementById("out").innerHTML =
    "<div class='cycle'>" + html + "</div>";

  /* next OFF */
  let next = new Date(c);
  while (true) {
    let diff = Math.floor((next - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;
    if (pos >= work) break;
    next.setDate(next.getDate() + 1);
  }

  document.getElementById("nextOff").innerText =
    "Next OFF: " + next.toDateString();
}
</script>

</body>
</html>
