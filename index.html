<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>O-Days</title>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  padding: 15px;
}

.day {
  display: inline-block;
  width: 75px;
  padding: 10px;
  margin: 4px;
  text-align: center;
  border-radius: 10px;
  font-size: 13px;

  border: 2px solid #555;   /* brighter base border */
}

/* WORK = secondary */
.work {
  background: #8b0000;
  color: #fff;
}

/* OFF = primary */
.off {
  background: #00e676;
  color: #000;
  font-weight: bold;
}

/* CURRENT CHECK DATE */
.today {
  border: 3px solid #ffffff;   /* strong white outline */
  box-shadow: 0 0 8px #ffffff; /* glow */
}
</style>

</head>

<body>

<h2>O-DAYS</h2>

<label>Start of Work Block:</label><br> <input id="start" type="date"><br><br>

<label>Pattern:</label><br> <select id="pattern">

  <option value="5-3">5 / 3</option>
  <option value="4-4">4 / 4</option>
  <option value="3-5">3 / 5</option>
</select><br><br>

<label>Check Date:</label><br> <input id="check" type="date" onchange="run()"><br><br>

<div id="out"></div>

<script>
function run() {
  let s = new Date(document.getElementById("start").value);
  let c = new Date(document.getElementById("check").value);
  let p = document.getElementById("pattern").value.split("-");
  let work = parseInt(p[0]);
  let off = parseInt(p[1]);
  let cycle = work + off;

  let html = "";

  for (let i = -3; i <= 4; i++) {
    let d = new Date(c);
    d.setDate(c.getDate() + i);

    let diff = Math.floor((d - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;

    let type = pos < work ? "work" : "off";

    html += "<div class='day " + type + "'>" +
            d.getDate() + "<br>" + type +
            "</div>";
  }

  document.getElementById("out").innerHTML = html;
}
</script>

</body>
</html>
