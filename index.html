<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roster Checker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="O-Days">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background: #000;
    color: #fff;
}

h1 {
    text-align: center;
    font-size: 20px;
    letter-spacing: 2px;
}

input, select, button {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    font-size: 16px;
    border-radius: 10px;
    border: none;
}

input, select {
    background: #1c1c1e;
    color: white;
}

button {
    background: #007aff;
    color: white;
}

.cycle {
    display: flex;
    overflow-x: auto;
    gap: 6px;
}

.day {
    flex: 0 0 90px;
    padding: 10px;
    border-radius: 10px;
}

.day.work {
    background: #1a1a1a;
    color: #777;
}

.day.off {
    background: #00e676;
    color: #000;
    font-weight: bold;
}

.today {
    border: 2px solid #fff;
}
</style>
</head>

<body>

<h1>O-DAYS</h1>

<button onclick="toggleSettings()">⚙ Settings</button>

<div id="settingsBox" style="display:none;">
    <label>First Work Day:</label>
    <input type="date" id="startDate">

    <label>Pattern:</label>
    <select id="pattern">
        <option value="5-3">5 Work / 3 Off</option>
        <option value="4-4">4 Work / 4 Off</option>
        <option value="3-5">3 Work / 5 Off</option>
    </select>
</div>

<label>Check Date:</label>
<input type="date" id="checkDate">

<button onclick="checkShift()">Check Roster</button>

<div id="output"></div>

<script>
function toggleSettings() {
    const box = document.getElementById("settingsBox");
    box.style.display = (box.style.display === "none") ? "block" : "none";
}

function checkShift() {
    const start = new Date(document.getElementById("startDate").value);
    const check = new Date(document.getElementById("checkDate").value);
    const pattern = document.getElementById("pattern").value;

    if (!start || !check) {
        alert("Please enter both dates");
        return;
    }

    let workDays = pattern.split("-")[0];

    const isWorkDay = (date) => {
        const diff = Math.floor((date - start) / (1000 * 60 * 60 * 24));
        return (diff % 8) < workDays;
    };

    let html = "<div class='cycle'>";

    for (let i = -3; i <= 4; i++) {
        let d = new Date(check);
        d.setDate(check.getDate() + i);

        let type = isWorkDay(d) ? "work" : "off";

        html += `<div class="day ${type}">${d.getDate()}</div>`;
    }
