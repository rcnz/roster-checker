<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>O-Days</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Flatpickr -->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  padding: 18px;
}

h1 {
  text-align: center;
  font-size: 26px;
}

/* inputs */
input, select {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #1c1c1e;
  color: white;
}

/* banner */
.banner {
  text-align: center;
  margin: 10px 0;
  font-size: 18px;
  font-weight: bold;
  color: #00ff99;
}

/* row */
.cycle {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

/* tiles */
.day {
  display: inline-block;
  width: 90px;
  padding: 12px;
  margin: 4px;
  border-radius: 10px;
  text-align: center;
  border: 2px solid #666;
}

.day-number {
  font-size: 18px;
  font-weight: bold;
}

.day-label {
  font-size: 13px;
}

/* WORK */
.work {
  background: #8b0000;
  color: #fff;
}

/* OFF */
.off {
  background: #00ff99;
  color: #000;
  font-weight: bold;
  box-shadow: 0 0 8px #00ff99;
}

/* SELECTED WORK */
.work.today {
  background: #ff2a2a;
  border: 3px solid #fff;
  box-shadow: 0 0 14px #ff2a2a;
  transform: scale(1.08);
}

/* SELECTED OFF */
.off.today {
  background: #00ff99;
  border: 3px solid #fff;
  box-shadow:
    0 0 16px #00ff99,
    0 0 30px #00ff99;
  transform: scale(1.08);
}

/* emphasis */
.today .day-number {
  font-size: 22px;
}

.today .day-label {
  font-size: 16px;
  font-weight: bold;
}

/* version */
.version {
  position: fixed;
  bottom: 5px;
  right: 10px;
  font-size: 14px;
  opacity: 0.7;
}
</style>

</head>

<body>

<h1>O-DAYS</h1>

<label>Start of Work Block:</label> <input id="start">

<label>Pattern:</label> <select id="pattern">

  <option value="5-3">5 / 3</option>
  <option value="4-4">4 / 4</option>
  <option value="3-5">3 / 5</option>
</select>

<label>Check Date:</label> <input id="check">

<div id="nextOff" class="banner"></div>

<div id="out"></div>

<div class="version">v24</div>

<script>

/* date pickers */
flatpickr("#start", {
  dateFormat: "d M Y"
});

flatpickr("#check", {
  dateFormat: "d M Y",
  onChange: run
});

/* main logic */
function run() {

  let s = new Date(document.getElementById("start").value);
  let c = new Date(document.getElementById("check").value);
  let p = document.getElementById("pattern").value.split("-");

  if (!s || !c) return;

  let work = parseInt(p[0]);
  let off = parseInt(p[1]);
  let cycle = work + off;

  let html = "";

  for (let i = -3; i <= 4; i++) {
    let d = new Date(c);
    d.setDate(c.getDate() + i);

    let diff = Math.floor((d - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;

    let type = pos < work ? "work" : "off";
    let label = (i === 0) ? type.toUpperCase() : type;

    html += "<div class='day " + type + (i===0 ? " today" : "") + "'>" +
            "<div class='day-number'>" + d.getDate() + "</div>" +
            "<div class='day-label'>" + label + "</div>" +
            "</div>";
  }

  document.getElementById("out").innerHTML =
    "<div class='cycle'>" + html + "</div>";

  /* next OFF */
  let next = new Date(c);
  while (true) {
    let diff = Math.floor((next - s) / 86400000);
    let pos = ((diff % cycle) + cycle) % cycle;
    if (pos >= work) break;
    next.setDate(next.getDate() + 1);
  }

  document.getElementById("nextOff").innerText =
    "Next OFF: " + next.toDateString();

  setTimeout(() => {
    document.querySelector('.today')?.scrollIntoView({
      behavior: "smooth",
      inline: "center"
    });
  }, 50);
}
</script>

</body>
</html>
